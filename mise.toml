[tasks.fmt]
description = "Runs rustfmt with unstable features"
run = "cargo fmt -- --config unstable_features=true --config imports_granularity=Item --config imports_layout=Vertical"

[tasks.check]
description = "Runs cargo-check against all features"
run = [
    "cargo check --all-features",
]

[tasks.fix]
description = "Runs cargo-fix against all features"
run = "cargo fix --all-features --allow-dirty"
depends_post = ["fmt"]

[tasks.clippy-fix]
description = "Runs cargo-clippy-fix against all features"
run = "cargo clippy --fix --all-features --allow-dirty"
depends_post = ["fmt"]

[tasks.fuzz]
description = "Runs all fuzz targets in parallel for 30s each"
depends = [
    "fuzz:info",
    "fuzz:players",
    "fuzz:rules",
    "fuzz:info-structured",
    "fuzz:players-structured",
    "fuzz:rules-structured",
]

[tasks."fuzz:info"]
description = "Fuzz info parser"
run = "cargo +nightly fuzz run fuzz_info -- -max_total_time=30"

[tasks."fuzz:players"]
description = "Fuzz players parser"
run = "cargo +nightly fuzz run fuzz_players -- -max_total_time=30"

[tasks."fuzz:rules"]
description = "Fuzz rules parser"
run = "cargo +nightly fuzz run fuzz_rules -- -max_total_time=30"

[tasks."fuzz:info-structured"]
description = "Fuzz info parser (structure-aware)"
run = "cargo +nightly fuzz run fuzz_info_structured -- -max_total_time=30"

[tasks."fuzz:players-structured"]
description = "Fuzz players parser (structure-aware)"
run = "cargo +nightly fuzz run fuzz_players_structured -- -max_total_time=30"

[tasks."fuzz:rules-structured"]
description = "Fuzz rules parser (structure-aware)"
run = "cargo +nightly fuzz run fuzz_rules_structured -- -max_total_time=30"
